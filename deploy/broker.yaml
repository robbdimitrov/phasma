apiVersion: v1
kind: ConfigMap
metadata:
  name: broker-pipelines
  labels:
    app: phasma
    tier: broker
data:
  sync-search.yaml: |
    input:
      kafka_franz:
        seed_brokers: ["${REDPANDA_BROKERS}"]
        topics: [entity-changes]
        consumer_group: sync-search

    pipeline:
      processors:
        - branch:
            request_map: |
              root = if this.table == "users" && this.op == "upsert" { this } else { deleted() }
            processors:
              - http:
                  url: "${MEILI_URL}/indexes/users/documents?primaryKey=id"
                  verb: POST
                  headers:
                    Authorization: "Bearer ${SEARCH_CONNECT_KEY}"
                    Content-Type: application/json
        - branch:
            request_map: |
              root = if this.table == "users" && this.op == "delete" { this } else { deleted() }
            processors:
              - http:
                  url: "${MEILI_URL}/indexes/users/documents/${! json(\"id\") }"
                  verb: DELETE
                  headers:
                    Authorization: "Bearer ${SEARCH_CONNECT_KEY}"
        - branch:
            request_map: |
              root = if this.table == "posts" && this.op == "upsert" { this } else { deleted() }
            processors:
              - http:
                  url: "${MEILI_URL}/indexes/posts/documents?primaryKey=post_id"
                  verb: POST
                  headers:
                    Authorization: "Bearer ${SEARCH_CONNECT_KEY}"
                    Content-Type: application/json
        - branch:
            request_map: |
              root = if this.table == "posts" && this.op == "delete" { this } else { deleted() }
            processors:
              - http:
                  url: "${MEILI_URL}/indexes/posts/documents/${! json(\"post_id\") }"
                  verb: DELETE
                  headers:
                    Authorization: "Bearer ${SEARCH_CONNECT_KEY}"
        - branch:
            request_map: |
              root = if this.table == "hashtags" && this.op == "upsert" && this.post_count > 0 { this } else { deleted() }
            processors:
              - http:
                  url: "${MEILI_URL}/indexes/hashtags/documents?primaryKey=name"
                  verb: POST
                  headers:
                    Authorization: "Bearer ${SEARCH_CONNECT_KEY}"
                    Content-Type: application/json
        - branch:
            request_map: |
              root = if this.table == "hashtags" && this.op == "upsert" && this.post_count == 0 { this } else { deleted() }
            processors:
              - http:
                  url: "${MEILI_URL}/indexes/hashtags/documents/${! json(\"name\") }"
                  verb: DELETE
                  headers:
                    Authorization: "Bearer ${SEARCH_CONNECT_KEY}"

    output:
      drop: {}
  backfill.yaml: |
    input:
      sql_select:
        driver: postgres
        dsn: "${DATABASE_URL}"
        table: |
          (SELECT id, username, name, COALESCE(avatar, '') AS avatar FROM users) AS search_users
        columns: [id, username, name, avatar]
        suffix: ORDER BY id

    pipeline:
      processors:
        - mapping: |
            root.table = "users"
            root.op = "upsert"
            root.id = this.id
            root.username = this.username
            root.name = this.name
            root.avatar = this.avatar

    output:
      kafka_franz:
        seed_brokers: ["${REDPANDA_BROKERS}"]
        topic: entity-changes
        key: ${! json("id") }
  backfill-posts.yaml: |
    input:
      sql_select:
        driver: postgres
        dsn: "${DATABASE_URL}"
        table: |
          (
            SELECT p.id,
                   p.public_id::text AS post_id,
                   p.user_id::text AS author_id,
                   COALESCE(p.description, '') AS description,
                   u.username,
                   COALESCE(json_agg(h.name ORDER BY h.name)
                     FILTER (WHERE h.name IS NOT NULL), '[]'::json)::text AS hashtags,
                   to_char(p.created AT TIME ZONE 'UTC',
                     'YYYY-MM-DD"T"HH24:MI:SS.US"Z"') AS created,
                   u.is_celebrity,
                   p.filename
            FROM posts p
            JOIN users u ON u.id = p.user_id
            LEFT JOIN post_hashtags ph ON ph.post_id = p.id
            LEFT JOIN hashtags h ON h.id = ph.hashtag_id
            GROUP BY p.id, u.username, u.is_celebrity
          ) AS search_posts
        columns: [id, post_id, author_id, description, username, hashtags, created, is_celebrity, filename]
        suffix: ORDER BY id

    pipeline:
      processors:
        - mapping: |
            root.table = "posts"
            root.op = "upsert"
            root.id = this.id
            root.post_id = this.post_id
            root.author_id = this.author_id
            root.description = this.description
            root.username = this.username
            root.hashtags = this.hashtags.parse_json()
            root.created = this.created
            root.is_celebrity = this.is_celebrity
            root.filename = this.filename

    output:
      kafka_franz:
        seed_brokers: ["${REDPANDA_BROKERS}"]
        topic: entity-changes
        key: ${! json("id") }
  backfill-hashtags.yaml: |
    input:
      sql_select:
        driver: postgres
        dsn: "${DATABASE_URL}"
        table: hashtags
        columns: [name, post_count]
        suffix: WHERE post_count > 0 ORDER BY name

    pipeline:
      processors:
        - mapping: |
            root.table = "hashtags"
            root.op = "upsert"
            root.name = this.name
            root.post_count = this.post_count

    output:
      kafka_franz:
        seed_brokers: ["${REDPANDA_BROKERS}"]
        topic: entity-changes
        key: ${! json("name") }
---
apiVersion: v1
kind: Service
metadata:
  name: broker
  labels:
    app: phasma
    tier: broker
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: phasma
    tier: broker
    component: broker
  ports:
    - name: broker
      port: 9092
      targetPort: broker
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: broker
  labels:
    app: phasma
    tier: broker
    component: broker
spec:
  serviceName: broker
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: phasma
      tier: broker
      component: broker
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: phasma
        tier: broker
        component: broker
    spec:
      serviceAccountName: broker
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: broker
          image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command: ["/usr/bin/rpk", "redpanda", "start"]
          args:
            - --config=/tmp/redpanda.yaml
            - --mode=dev-container
            - --smp=1
            - --memory=256M
            - --reserve-memory=0M
            - --reactor-backend=epoll
            - --kernel-page-cache=1
            - --aio-fsync=0
            - --max-networking-io-control-blocks=128
            - --node-id=0
            - --kafka-addr=0.0.0.0:9092
            - --advertise-kafka-addr=broker-0.broker:9092
            - --rpc-addr=0.0.0.0:33145
            - --advertise-rpc-addr=broker-0.broker:33145
          ports:
            - name: broker
              containerPort: 9092
            - name: admin
              containerPort: 9644
          resources:
            limits:
              memory: 512Mi
            requests:
              memory: 256Mi
              cpu: 200m
          startupProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            failureThreshold: 60
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - mountPath: /var/lib/redpanda/data
              name: broker-data
            - mountPath: /tmp
              name: temporary-files
      volumes:
        - name: temporary-files
          emptyDir:
            sizeLimit: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: broker-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connect
  labels:
    app: phasma
    tier: broker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: phasma
      tier: broker
      component: connect
  template:
    metadata:
      labels:
        app: phasma
        tier: broker
        component: connect
    spec:
      serviceAccountName: connect
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: connect
          image: docker.redpanda.com/redpandadata/connect:4.38.0
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - /redpanda-connect
            - streams
            - /etc/connect/sync-search.yaml
          env:
            - name: MEILI_URL
              value: http://search:7700
            - name: SEARCH_CONNECT_KEY
              valueFrom:
                secretKeyRef:
                  name: connect-secret
                  key: search-connect-key
            - name: REDPANDA_BROKERS
              value: broker:9092
          resources:
            limits:
              memory: 256Mi
            requests:
              memory: 128Mi
              cpu: 100m
          startupProbe:
            httpGet:
              path: /ready
              port: 4195
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: 4195
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: 4195
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: broker-pipelines
              mountPath: /etc/connect
      volumes:
        - name: broker-pipelines
          configMap:
            name: broker-pipelines
            defaultMode: 0444
---
apiVersion: batch/v1
kind: Job
metadata:
  name: broker-backfill
  labels:
    app: phasma
    tier: broker
spec:
  suspend: true
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: phasma
        tier: broker
    spec:
      restartPolicy: Never
      serviceAccountName: connect
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: provision-connect-user
          image: postgres:18.4-alpine
          imagePullPolicy: IfNotPresent
          command: [sh, -c]
          args:
            - |
              for i in $(seq 1 30); do
                if psql "postgresql://postgres:${POSTGRES_PASSWORD}@database:5432/phasma?sslmode=require" \
                  -c "DO \$\$
                      DECLARE v text := current_setting('phasma.connect_password');
                      BEGIN
                        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'phasma_connect_user') THEN
                          EXECUTE format('CREATE USER phasma_connect_user WITH REPLICATION PASSWORD %L', v);
                        ELSE
                          EXECUTE format('ALTER USER phasma_connect_user WITH REPLICATION PASSWORD %L', v);
                        END IF;
                        GRANT phasma_connect TO phasma_connect_user;
                      END \$\$;"; then
                  exit 0
                fi
                sleep 2
              done
              exit 1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              memory: 64Mi
            requests:
              memory: 64Mi
              cpu: 50m
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: database-password
            - name: CONNECT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: connect-secret
                  key: connect-db-password
            - name: PGOPTIONS
              value: -c phasma.connect_password=$(CONNECT_DB_PASSWORD)
      containers:
        - name: connect
          image: docker.redpanda.com/redpandadata/connect:4.38.0
          command: [sh, -c]
          args:
            - |
              set -e
              /redpanda-connect run /etc/connect/backfill.yaml
              /redpanda-connect run /etc/connect/backfill-posts.yaml
              /redpanda-connect run /etc/connect/backfill-hashtags.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: CONNECT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: connect-secret
                  key: connect-db-password
            - name: POSTGRES_DB
              value: phasma
            - name: DATABASE_URL
              value: postgresql://phasma_connect_user:$(CONNECT_DB_PASSWORD)@database:5432/$(POSTGRES_DB)?sslmode=require
            - name: MEILI_URL
              value: http://search:7700
            - name: SEARCH_CONNECT_KEY
              valueFrom:
                secretKeyRef:
                  name: connect-secret
                  key: search-connect-key
            - name: REDPANDA_BROKERS
              value: broker:9092
          resources:
            limits:
              memory: 256Mi
            requests:
              memory: 128Mi
              cpu: 100m
          volumeMounts:
            - name: pipelines
              mountPath: /etc/connect
      volumes:
        - name: pipelines
          configMap:
            name: broker-pipelines
            defaultMode: 0444
