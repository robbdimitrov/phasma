apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: phasma
  name: frontend
  labels:
    app: phasma
    tier: frontend
  annotations:
    # Allow the backend's 1 MB upload limit plus multipart overhead.
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  # Frontend is the only public entry point; it proxies backend traffic in-cluster.
  rules:
    - host: phasma.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
  tls:
    - hosts:
        - phasma.localhost
      secretName: frontend-tls
